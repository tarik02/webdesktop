server:
  listen_address: 127.0.0.1:8080
  shutdown_timeout: 10s

logging:
  level: info
  format: json

tracing:
  enabled: false

video:
  source: monitor
  cursor_mode: embedded
  codec: vp8
  width: 1920
  height: 1080
  framerate: 30
  bitrate_kbps: 4000
  tuning:
    threads: 8
    keyframe_interval: 60
    vp8_cpu_used: 16

audio:
  enabled: false
  device: "@DEFAULT_MONITOR@"
  bitrate_kbps: 128

input:
  enabled: true
  pointer: true
  keyboard: true
  queue_size: 256

clipboard:
  enabled: true

webrtc:
  signaling_path: /webrtc
  max_peers: 2
  ice_servers: []
  ice_username: ""
  ice_credential: ""
  udp_port_min: 0
  udp_port_max: 0
  allowed_origins: []
